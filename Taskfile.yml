version: "3"

vars:
  FLAKE_FLAGS: "--impure"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Auto-format Nix files and remove unused declarations
    cmds:
      - nix run nixpkgs#deadnix -- --edit *.nix modules/
      - nix run nixpkgs#nixpkgs-fmt -- *.nix modules/

  validate:
    desc: Validate Nix syntax, flake integrity, and check for merge conflicts
    cmds:
      - nix-instantiate --parse-only flake.nix
      - find modules -name '*.nix' -exec nix-instantiate --parse-only {} \;
      - nix flake check --no-build {{.FLAKE_FLAGS}}
      - |
        if git grep -l '<<<<<<< HEAD' -- '*.nix' '*.md' 2>/dev/null; then
          echo "Merge conflicts found!"
          exit 1
        fi

  lint:
    desc: Static analysis — deadnix and format checks
    deps: [validate]
    cmds:
      - nix run nixpkgs#deadnix -- *.nix modules/
      - nix run nixpkgs#nixpkgs-fmt -- --check *.nix modules/

  build:
    desc: Build configuration without switching (dry-run evaluation)
    cmds:
      - home-manager build --flake . {{.FLAKE_FLAGS}}
      - rm -f result

  scan:
    desc: Check for hardcoded secrets in tracked Nix files
    cmds:
      - |
        if git ls-files '*.nix' | xargs grep -l 'password\s*=\|secret\s*=\|api_key\s*=\|token\s*=' 2>/dev/null; then
          echo "Potential secrets found — review before committing"
          exit 1
        fi

  audit:
    desc: Full pre-merge gate — fmt, validate, lint, scan
    cmds:
      - task: fmt
      - task: validate
      - task: lint
      - task: scan

  clean:
    desc: Remove build artifacts and clear eval cache
    cmds:
      - rm -f result
      - rm -rf ~/.cache/nix/eval-cache-v6/ || true

  switch:
    desc: Build and apply new configuration
    cmds:
      - home-manager switch --flake . {{.FLAKE_FLAGS}}

  switch:trace:
    desc: Apply configuration with detailed error traces
    cmds:
      - home-manager switch --flake . {{.FLAKE_FLAGS}} --show-trace

  update:
    desc: Update all flake inputs
    cmds:
      - nix flake update

  update:input:
    desc: Update a specific flake input (INPUT=nixpkgs)
    requires:
      vars: [INPUT]
    cmds:
      - nix flake update {{.INPUT}}

  gc:
    desc: Garbage collection — removes ALL old generations
    prompt: This will delete all old Nix generations and cannot be undone. Continue?
    cmds:
      - nix-collect-garbage -d

  gc:safe:
    desc: Safe garbage collection — keeps last 30 days
    cmds:
      - nix-collect-garbage --delete-older-than 30d

  list:
    desc: List home-manager generations
    cmds:
      - home-manager generations

  rollback:
    desc: Rollback to previous generation
    prompt: Roll back to the previous home-manager generation?
    cmds:
      - home-manager switch --rollback

  info:
    desc: Show flake metadata and input versions
    cmds:
      - nix flake metadata {{.FLAKE_FLAGS}}

  doctor:
    desc: Run nix doctor diagnostics
    cmds:
      - nix doctor
